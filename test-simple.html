<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>末日防线 v1.0.2 极简版</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #0a0a0f 0%, #1a1a2e 100%);
            color: white;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        h1 {
            font-size: 48px;
            background: linear-gradient(135deg, #00f3ff, #bc13fe);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 40px;
        }
        .btn {
            padding: 20px 60px;
            font-size: 24px;
            background: linear-gradient(135deg, #00f3ff, #bc13fe);
            border: none;
            border-radius: 12px;
            color: white;
            cursor: pointer;
            margin: 10px;
            box-shadow: 0 0 30px rgba(0, 243, 255, 0.4);
        }
        .btn:active { transform: scale(0.95); }
        .info {
            margin-top: 30px;
            padding: 20px;
            background: rgba(255,255,255,0.1);
            border-radius: 8px;
            text-align: center;
        }
        #status { color: #00ff88; margin-top: 10px; }
    </style>
</head>
<body>
    <h1>🎮 末日防线：代号曙光</h1>
    
    <button class="btn" onclick="startGame()">开始游戏</button>
    <button class="btn" onclick="showInfo()">游戏信息</button>
    
    <div class="info">
        <div>版本：v1.0.2 极简测试版</div>
        <div id="status">✅ 服务器运行正常</div>
        <div id="time"></div>
    </div>

    <script>
        // 显示当前时间
        function updateTime() {
            document.getElementById('time').textContent = new Date().toLocaleString('zh-CN');
        }
        updateTime();
        setInterval(updateTime, 1000);

        // 测试 localStorage
        try {
            localStorage.setItem('test', 'ok');
            console.log('✅ localStorage 可用');
        } catch(e) {
            console.log('⚠️ localStorage 不可用:', e);
        }

        function startGame() {
            alert('🎮 战斗系统开发中！\n\n当前版本：v1.0.2\n章节一已完成');
        }

        function showInfo() {
            alert('📊 游戏信息\n\n类型：Roguelike 射击塔防\n风格：科幻机甲 + 赛博朋克\n状态：章节一完成 (1/13)');
        }

        console.log('🎮 游戏加载成功！');
    </script>
</body>
</html>
