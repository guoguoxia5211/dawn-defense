<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>末日防线：代号曙光 v3.0.0</title>
    <style>
        :root { --neon-blue: #00f3ff; --neon-purple: #bc13fe; --neon-orange: #ff6b35; --neon-red: #ff4444; --neon-green: #00ff88; }
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
        body { font-family: Arial, sans-serif; background: #0a0a0f; color: white; overflow: hidden; width: 100vw; height: 100vh; }
        #game-container { position: relative; width: 100%; height: 100%; }
        
        /* 画布 */
        #game-canvas { display: block; background: linear-gradient(180deg, #1a1a2e 0%, #0a0a0f 100%); }
        
        /* 战斗 UI */
        #battle-ui { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        .ui-top { position: absolute; top: 10px; left: 10px; right: 10px; display: flex; justify-content: space-between; align-items: flex-start; }
        .hp-bar { width: 200px; height: 20px; background: rgba(0,0,0,0.5); border: 2px solid #333; border-radius: 10px; overflow: hidden; }
        .hp-fill { height: 100%; background: linear-gradient(90deg, #ff4444, #ff6b35); transition: width 0.3s; }
        .wave-info { text-align: center; }
        .wave-num { font-size: 24px; font-weight: bold; color: var(--neon-blue); }
        .wave-label { font-size: 12px; color: #888; }
        .score-info { text-align: right; }
        .score-num { font-size: 20px; color: var(--neon-orange); }
        
        /* 暂停按钮 */
        .btn-pause { position: absolute; top: 10px; right: 10px; width: 40px; height: 40px; background: rgba(0,243,255,0.2); border: 2px solid var(--neon-blue); border-radius: 8px; color: var(--neon-blue); font-size: 20px; cursor: pointer; pointer-events: auto; }
        
        /* 暂停菜单 */
        #pause-menu { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: none; justify-content: center; align-items: center; pointer-events: auto; }
        .pause-content { text-align: center; }
        .pause-title { font-size: 48px; color: var(--neon-blue); margin-bottom: 40px; }
        .pause-btn { display: block; width: 200px; padding: 15px; margin: 10px auto; background: var(--glass-bg); border: 2px solid var(--neon-blue); border-radius: 8px; color: white; font-size: 18px; cursor: pointer; }
        .pause-btn:hover { background: rgba(0,243,255,0.2); }
        
        /* 游戏结束 */
        #gameover-menu { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: none; justify-content: center; align-items: center; pointer-events: auto; }
        .gameover-content { text-align: center; }
        .gameover-title { font-size: 56px; color: var(--neon-red); margin-bottom: 20px; }
        .gameover-stats { font-size: 24px; margin: 20px 0; color: #888; }
        
        /* 主界面 */
        .screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: none; }
        .screen.active { display: flex; }
        #main-menu { background: radial-gradient(circle at 20% 80%, rgba(188,19,254,0.15), transparent 50%), radial-gradient(circle at 80% 20%, rgba(0,243,255,0.15), transparent 50%); flex-direction: column; justify-content: center; align-items: center; }
        .game-title { font-size: 52px; background: linear-gradient(135deg, var(--neon-blue), var(--neon-purple)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 40px; }
        .btn { padding: 18px 60px; font-size: 22px; font-weight: bold; border: none; border-radius: 8px; cursor: pointer; margin: 10px; text-transform: uppercase; letter-spacing: 2px; }
        .btn-primary { background: linear-gradient(135deg, var(--neon-blue), var(--neon-purple)); color: white; box-shadow: 0 0 20px rgba(0,243,255,0.4); }
        .btn-secondary { background: rgba(20,30,40,0.85); color: white; border: 2px solid var(--neon-blue); }
        .version { position: absolute; bottom: 20px; right: 20px; color: #666; font-size: 12px; }
    </style>
</head>
<body>
    <div id="game-container">
        <!-- 主界面 -->
        <div id="main-menu" class="screen active">
            <h1 class="game-title">末日防线：代号曙光</h1>
            <button class="btn btn-primary" id="btn-start">开始战斗</button>
            <button class="btn btn-secondary" id="btn-help">游戏说明</button>
            <div class="version">v3.0.0</div>
        </div>

        <!-- 游戏画布 -->
        <canvas id="game-canvas" class="screen"></canvas>
        
        <!-- 战斗 UI -->
        <div id="battle-ui" class="screen">
            <div class="ui-top">
                <div>
                    <div class="hp-bar"><div class="hp-fill" id="base-hp" style="width: 100%"></div></div>
                    <div style="font-size:12px;color:#888;margin-top:5px">基地血量</div>
                </div>
                <div class="wave-info">
                    <div class="wave-num" id="wave-num">1</div>
                    <div class="wave-label">WAVE</div>
                </div>
                <div class="score-info">
                    <div class="score-num" id="score">0</div>
                    <div style="font-size:12px;color:#888">KILLS</div>
                </div>
            </div>
            <button class="btn-pause" id="btn-pause">⏸</button>
        </div>

        <!-- 暂停菜单 -->
        <div id="pause-menu">
            <div class="pause-content">
                <div class="pause-title">已暂停</div>
                <button class="pause-btn" id="btn-resume">继续战斗</button>
                <button class="pause-btn" id="btn-restart">重新开始</button>
                <button class="pause-btn" id="btn-quit">返回主菜单</button>
            </div>
        </div>

        <!-- 游戏结束 -->
        <div id="gameover-menu">
            <div class="gameover-content">
                <div class="gameover-title">GAME OVER</div>
                <div class="gameover-stats">
                    <div>波次：<span id="final-wave" style="color:var(--neon-blue)">0</span></div>
                    <div>击杀：<span id="final-score" style="color:var(--neon-orange)">0</span></div>
                </div>
                <button class="pause-btn" id="btn-retry">再次挑战</button>
                <button class="pause-btn" id="btn-quit2">返回主菜单</button>
            </div>
        </div>
    </div>

    <script src="scripts/battle.js"></script>
</body>
</html>
